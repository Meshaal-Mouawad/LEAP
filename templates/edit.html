<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LEAP Override Workspace</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --charcoal: #1C1D20;
      --slate-bg: #F6F7F9;
      --slate-border: #E9ECEF;
      --slate-muted: #8B93A7;
      --success: #0D9488;
      --warning: #F59E0B;
	      --danger: #EF4444;
	      --info: #3B82F6;
	      --matte-teal: #0D9488;
	      --matte-olive: #3F5F46;
	      --matte-teal: #0D9488;
	    }
	    * { box-sizing: border-box; }
	    body {
	      margin: 0;
	      background: var(--slate-bg);
	      color: var(--charcoal);
	      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
	      letter-spacing: 0;
	      -webkit-font-smoothing: antialiased;
	      text-rendering: optimizeLegibility;
	    }
    .font-mono { font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace; }
    .leap-brand-icon {
      width: auto;
      max-width: 32px;
      height: 24px;
      display: block;
      flex: 0 0 auto;
    }
	    .thin-border { border: 1px solid var(--slate-border); }
	    .section-header {
	      margin: 0;
	      color: #1E293B;
	      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
	      font-size: 13px;
	      font-weight: 600;
	      letter-spacing: 0.02em;
	      text-transform: uppercase;
	      line-height: 1.3;
	    }
    .status-badge {
      background: var(--success);
      color: #fff;
      font-size: 11px;
      padding: 2px 8px;
    }
    .growth-badge {
      background: #F0FDFA;
      color: var(--success);
      font-size: 11px;
      padding: 2px 6px;
      border: 1px solid #CCFBF1;
    }
	    .card {
	      background: #fff;
	      border: 1px solid var(--slate-border);
	      border-radius: 6px;
	      padding: 20px;
	    }
    .topbar {
      width: 100%;
      background: #FFFFFF;
      color: #1C1D20;
      border-bottom: 1px solid #E2E8F0;
    }
    .topbar-title {
      margin: 0;
      color: #1E293B;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    .topbar-subtitle {
      margin: 0;
      color: #64748B;
      font-size: 12px;
    }
	    label {
	      display: block;
	      color: var(--slate-muted);
	      font-size: 11px;
	      font-weight: 600;
	      letter-spacing: .05em;
	      margin: 16px 0 6px;
	      text-transform: uppercase;
	    }
    textarea,
    input[type="text"],
    select {
      width: 100%;
	      min-height: 38px;
	      border: 1px solid var(--slate-border);
	      border-radius: 4px;
	      background: #fff;
	      color: var(--charcoal);
	      padding: 8px 10px;
	      font: 12.5px/1.45 Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
	      outline: none;
	    }
	    textarea {
	      min-height: 86px;
	      resize: vertical;
	    }
    textarea:focus,
	    input[type="text"]:focus,
	    select:focus {
	      border-color: var(--matte-teal);
	      box-shadow: 0 0 0 1px var(--matte-teal);
	    }
	    .score {
	      margin-top: 10px;
	      background: #fff;
	      border: 1px solid var(--slate-border);
	      border-radius: 4px;
	      padding: 12px;
	    }
    .bar {
      height: 6px;
      overflow: hidden;
      background: var(--slate-border);
    }
    .bar span {
      display: block;
      height: 100%;
      background: var(--success);
    }
    .score-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 8px;
      color: var(--slate-muted);
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
    }
	    .btn {
	      display: inline-flex;
	      align-items: center;
	      justify-content: center;
	      min-height: 38px;
	      padding: 9px 14px;
	      border: 1px solid var(--slate-border);
	      border-left: 3px solid transparent;
	      border-radius: 4px;
	      background: #fff;
	      color: var(--charcoal);
	      cursor: pointer;
	      font-size: 12px;
	      font-weight: 500;
	      text-transform: uppercase;
	      transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
	    }
	    .btn-primary {
	      background: #fff;
	      border-color: var(--slate-border);
	      color: var(--charcoal);
	    }
	    .btn:hover,
	    .btn:focus-visible,
	    .btn-primary:hover,
	    .btn-primary:focus-visible {
	      background: #fff;
	      border-left-color: var(--matte-teal);
	      color: var(--matte-teal);
	      outline: none;
	    }
	    .edit-title {
	      margin: 0 0 4px;
	      color: #0F172A;
	      font-size: 24px;
	      font-weight: 600;
	      letter-spacing: -0.02em;
	      text-transform: none;
	    }
	    .edit-sidebar {
	      display: grid;
	      gap: 20px;
	      align-content: start;
	    }
	    .edit-sidebar .card {
	      padding: 16px;
	    }
	    .edit-sidebar .section-header {
	      color: var(--slate-muted);
	      font-size: 11px;
	      letter-spacing: 0.05em;
	    }
	    body textarea,
	    body input[type="text"],
	    body select {
	      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
	      font-size: 12.5px !important;
	      line-height: 1.45 !important;
	    }
	    body .btn {
	      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
	      border-left: 3px solid transparent !important;
	    }
	    body .btn:hover,
	    body .btn:focus-visible {
	      border-left-color: var(--matte-teal) !important;
	      color: var(--matte-teal) !important;
	      background: #fff !important;
	    }
    .raci-badge { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; font-weight: 700; font-size: 11px; border-radius: 4px; margin-right: 6px; }
    .raci-r { background: #0D9488; color: #FFFFFF; }
    .raci-a { background: #1C1D20; color: #FFFFFF; }
    .raci-c { background: #E2E8F0; color: #475569; border: 1px solid #CBD5E1; }
    .raci-i { background: #F1F5F9; color: #64748B; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between min-h-[52px] py-3 gap-4 flex-wrap">
        <div class="flex items-center gap-4">
          <img src="/bluebook/_static/leap-logo-verified-apex.svg" alt="LEAP" class="leap-brand-icon">
          <div>
            <h1 class="topbar-title">LEAP PLATFORM</h1>
            <p class="topbar-subtitle">LEAP PLATFORM: Full enterprise-grade KPI intelligence platform</p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <span class="growth-badge">Manual Governance</span>
          <span class="status-badge">OVERRIDE READY</span>
        </div>
      </div>
    </div>
  </header>

	  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
	    <div class="mb-8">
	      <h2 class="edit-title">KPI Override Record</h2>
	      <p class="text-sm" style="color: var(--slate-muted);">Manual business metadata and RACI stewardship control</p>
	      <div class="growth-badge inline-flex mt-3 font-mono" id="kpi-title"></div>
	    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <div class="lg:col-span-2 space-y-6">
        <section class="card">
          <div class="flex items-center justify-between mb-4">
            <h3 class="section-header">Semantic Core</h3>
            <span class="status-badge">Editable</span>
          </div>
          <label for="description">Definition</label>
          <textarea id="description" placeholder="Describe the KPI in one or two precise sentences"></textarea>

          <label for="objective">Business Context</label>
          <textarea id="objective" placeholder="What this KPI drives, monitors, or controls"></textarea>

          <label for="input_measure">Dependency Inputs</label>
          <textarea id="input_measure" placeholder="Inputs, measurements, or source fields feeding this KPI"></textarea>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label for="unit_of_measure">Unit of Measure</label>
              <input id="unit_of_measure" type="text" placeholder="%, tons/day, ratio, dimensionless">
            </div>
            <div>
              <label for="reporting_source">Reporting Source</label>
              <input id="reporting_source" type="text" placeholder="Historian, MES, Lab LIMS, ERP">
            </div>
          </div>

          <label for="comments">Edge Cases / Comments</label>
          <textarea id="comments" placeholder="Special calculation notes, assumptions, or review comments"></textarea>
        </section>
      </div>

	      <aside class="edit-sidebar">
        <section class="card">
          <h3 class="section-header mb-4">RACI Governance</h3>

          <label for="responsible">Responsible</label>
          <select id="responsible">
            <option value="">Use inferred role</option>
            <option value="Data Engineering Team">Data Engineering Team</option>
            <option value="KPI Application Developer">KPI Application Developer</option>
            <option value="Operations Analytics Team">Operations Analytics Team</option>
            <option value="Finance Analytics Team">Finance Analytics Team</option>
            <option value="HSE Analytics Team">HSE Analytics Team</option>
            <option value="Customer Experience Analytics Team">Customer Experience Analytics Team</option>
          </select>

          <label for="accountable">Accountable</label>
          <select id="accountable">
            <option value="">Use inferred owner</option>
            <option value="Enterprise Data Owner">Enterprise Data Owner</option>
            <option value="Operations Data Owner">Operations Data Owner</option>
            <option value="Finance Data Owner">Finance Data Owner</option>
            <option value="HSE Data Owner">HSE Data Owner</option>
            <option value="Maintenance Data Owner">Maintenance Data Owner</option>
            <option value="Customer Experience Data Owner">Customer Experience Data Owner</option>
          </select>

          <label for="consulted">Consulted</label>
          <select id="consulted">
            <option value="">Use inferred consultation</option>
            <option value="Domain Subject Matter Expert">Domain Subject Matter Expert</option>
            <option value="Process Engineering SME">Process Engineering SME</option>
            <option value="Reliability Engineering SME">Reliability Engineering SME</option>
            <option value="Finance Controller">Finance Controller</option>
            <option value="HSE Compliance Lead">HSE Compliance Lead</option>
            <option value="Customer Operations Lead">Customer Operations Lead</option>
          </select>

          <label for="informed">Informed</label>
          <select id="informed">
            <option value="">Use inferred audience</option>
            <option value="Business Stakeholders">Business Stakeholders</option>
            <option value="Executive Leadership">Executive Leadership</option>
            <option value="Operations Leadership">Operations Leadership</option>
            <option value="Finance Leadership">Finance Leadership</option>
            <option value="HSE Leadership">HSE Leadership</option>
            <option value="KPI Consumers">KPI Consumers</option>
          </select>

          <label for="confidence">Governance Confidence</label>
          <select id="confidence">
            <option value="">Use inferred value</option>
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
          </select>
          <div class="score">
            <div class="bar"><span id="confidence-bar"></span></div>
            <div class="score-meta">
              <span id="confidence-label">Inferred</span>
              <span id="confidence-score">Inferred</span>
            </div>
          </div>

          <label for="basis">Governance Basis</label>
          <textarea id="basis" placeholder="Explain why this owner assignment is correct"></textarea>
        </section>

        <section class="card">
          <h3 class="section-header mb-4">Actions</h3>
          <div class="flex flex-wrap gap-2">
            <button class="btn btn-primary" id="saveBtn">Save Override</button>
            <button class="btn" onclick="window.close(); return false;">Close</button>
          </div>
          <div class="text-xs mt-4" style="color: var(--slate-muted);" id="msg"></div>
        </section>
      </aside>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const kpiName = params.get('kpi') || '';
    document.getElementById('kpi-title').textContent = kpiName ? kpiName : 'No KPI specified';

    const confidenceMap = {
      High: {score: '85% Confidence', width: '85%'},
      Medium: {score: '65% Confidence', width: '65%'},
      Low: {score: '40% Confidence', width: '40%'},
      '': {score: 'Inferred', width: '50%'}
    };

    function setSelectValue(id, value) {
      const el = document.getElementById(id);
      if (!el) return;
      if (value && !Array.from(el.options).some((option) => option.value === value)) {
        el.add(new Option(value, value));
      }
      el.value = value || '';
    }

    function updateConfidence() {
      const value = document.getElementById('confidence').value;
      const mapped = confidenceMap[value] || confidenceMap[''];
      document.getElementById('confidence-bar').style.width = mapped.width;
      document.getElementById('confidence-label').textContent = value || 'Inferred';
      document.getElementById('confidence-score').textContent = mapped.score;
    }

    async function loadOverrides() {
      if (!kpiName) return;
      const [definitionRes, governanceRes] = await Promise.all([
        fetch(`/overrides/${encodeURIComponent(kpiName)}`),
        fetch(`/governance-overrides/${encodeURIComponent(kpiName)}`)
      ]);
      if (definitionRes.ok) {
        const data = await definitionRes.json();
        for (const [k, v] of Object.entries(data || {})) {
          const el = document.getElementById(k);
          if (el) el.value = v;
        }
      }
      if (governanceRes.ok) {
        const data = await governanceRes.json();
        for (const [k, v] of Object.entries(data || {})) {
          if (['responsible', 'accountable', 'consulted', 'informed', 'confidence'].includes(k)) {
            setSelectValue(k, v);
          } else {
            const el = document.getElementById(k);
            if (el) el.value = v;
          }
        }
      }
      updateConfidence();
    }

    async function postJson(url, payload) {
      return fetch(url, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
      });
    }

    async function save() {
      const definitionPayload = {
        kpi_name: kpiName,
        fields: {
          description: document.getElementById('description').value,
          objective: document.getElementById('objective').value,
          input_measure: document.getElementById('input_measure').value,
          unit_of_measure: document.getElementById('unit_of_measure').value,
          reporting_source: document.getElementById('reporting_source').value,
          comments: document.getElementById('comments').value
        }
      };
      const governancePayload = {
        kpi_name: kpiName,
        fields: {
          responsible: document.getElementById('responsible').value,
          accountable: document.getElementById('accountable').value,
          consulted: document.getElementById('consulted').value,
          informed: document.getElementById('informed').value,
          confidence: document.getElementById('confidence').value,
          basis: document.getElementById('basis').value
        }
      };

      const msg = document.getElementById('msg');
      const [definitionRes, governanceRes] = await Promise.all([
        postJson('/overrides', definitionPayload),
        postJson('/governance-overrides', governancePayload)
      ]);
      if (definitionRes.ok && governanceRes.ok) {
        msg.textContent = 'Saved. Regenerate the Bluebook to apply changes.';
        msg.style.color = 'var(--success)';
      } else {
        const failed = !definitionRes.ok ? definitionRes : governanceRes;
        const err = await failed.json().catch(() => ({}));
        msg.textContent = 'Failed to save: ' + (err.error || failed.statusText);
        msg.style.color = 'var(--danger)';
      }
    }

    document.getElementById('confidence').addEventListener('change', updateConfidence);
    document.getElementById('saveBtn').addEventListener('click', save);
    loadOverrides();
  </script>
</body>
</html>
